<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Type Quest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#eef3f8;
    --panel:#ffffff;
    --ink:#2c3a4b;
    --ink-soft:#6b7c8f;
    --line:#dde6ef;
    --ok:#3fae6b;
    --bad:#e8615f;

    /* finger colours, left to right across the hands */
    --LP:#ee6c8a; /* left pinky  */
    --LR:#f2945b; /* left ring   */
    --LM:#f4c14e; /* left middle */
    --LI:#7fc15e; /* left index  */
    --RI:#38b6a6; /* right index */
    --RM:#4d9de0; /* right middle*/
    --RR:#7c77d1; /* right ring  */
    --RP:#b069c9; /* right pinky */
    --TH:#9aa7b4; /* thumbs      */
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:'Nunito',system-ui,sans-serif;
    background:radial-gradient(1200px 700px at 50% -10%, #f7fafd 0%, var(--bg) 60%);
    color:var(--ink);
    -webkit-user-select:none; user-select:none;
    touch-action:manipulation;
    display:flex; flex-direction:column;
    min-height:100vh;
    overflow-x:hidden;
  }

  header{
    display:flex; align-items:center; justify-content:space-between;
    gap:12px;
    padding:14px clamp(14px,4vw,32px);
    max-width:1100px; width:100%; margin:0 auto;
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand .dots{display:flex; gap:4px;}
  .brand .dots i{width:11px;height:11px;border-radius:50%;display:block;}
  .brand .dots i:nth-child(1){background:var(--LP);}
  .brand .dots i:nth-child(2){background:var(--LM);}
  .brand .dots i:nth-child(3){background:var(--RI);}
  .brand .dots i:nth-child(4){background:var(--RR);}
  .brand h1{
    font-family:'Fredoka',sans-serif; font-weight:600;
    font-size:clamp(20px,3.2vw,28px); margin:0; letter-spacing:.2px;
  }
  .level-tag{
    font-family:'Fredoka',sans-serif; font-weight:500;
    font-size:15px; color:var(--ink-soft);
    background:var(--panel); border:1.5px solid var(--line);
    padding:7px 14px; border-radius:999px;
  }
  .btn-ghost{
    font-family:'Fredoka',sans-serif; font-weight:500; font-size:15px;
    color:var(--ink-soft); background:var(--panel);
    border:1.5px solid var(--line); border-radius:999px;
    padding:7px 16px; cursor:pointer;
  }
  .btn-ghost:hover{color:var(--ink);}

  main{
    flex:1; width:100%; max-width:1100px; margin:0 auto;
    padding:0 clamp(14px,4vw,32px) 24px;
    display:flex; flex-direction:column;
  }

  /* ---------- start / level select ---------- */
  .levels{
    display:grid; grid-template-columns:repeat(3,1fr);
    gap:18px; margin:auto 0; padding:10px 0 30px;
  }
  .lead{
    text-align:center; margin:24px 0 6px;
  }
  .lead h2{
    font-family:'Fredoka',sans-serif; font-weight:600;
    font-size:clamp(26px,5vw,40px); margin:0 0 6px;
  }
  .lead p{margin:0; color:var(--ink-soft); font-size:17px; font-weight:600;}

  .lvl-card{
    background:var(--panel); border:2px solid var(--line);
    border-radius:22px; padding:22px 18px 20px; text-align:center;
    cursor:pointer; transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;
    position:relative;
  }
  .lvl-card:hover{transform:translateY(-3px); box-shadow:0 12px 28px rgba(44,58,75,.10);}
  .lvl-card .num{
    font-family:'Fredoka',sans-serif; font-weight:700; font-size:15px;
    color:#fff; width:40px;height:40px;border-radius:14px;
    display:grid;place-items:center; margin:0 auto 12px;
  }
  .lvl-card:nth-child(1) .num{background:var(--LM);}
  .lvl-card:nth-child(2) .num{background:var(--RI);}
  .lvl-card:nth-child(3) .num{background:var(--RR);}
  .lvl-card h3{font-family:'Fredoka',sans-serif; font-weight:600; font-size:21px; margin:0 0 4px;}
  .lvl-card p{margin:0; color:var(--ink-soft); font-size:14.5px; font-weight:600; line-height:1.35;}
  .lvl-card.locked{cursor:not-allowed; opacity:.55;}
  .lvl-card.locked:hover{transform:none; box-shadow:none;}
  .lvl-card .lock{position:absolute; top:14px; right:16px; font-size:18px; opacity:.7;}

  /* ---------- play screen ---------- */
  .play{display:none; flex-direction:column; flex:1;}
  .play.on{display:flex;}

  .progress-wrap{
    display:flex; align-items:center; gap:14px;
    max-width:680px; width:100%; margin:6px auto 0;
  }
  .bar{flex:1; height:10px; background:#e3ebf3; border-radius:999px; overflow:hidden;}
  .bar > i{display:block; height:100%; width:0%; border-radius:999px;
    background:linear-gradient(90deg,var(--LI),var(--RI)); transition:width .3s ease;}
  .count{font-family:'Fredoka',sans-serif; font-weight:500; color:var(--ink-soft); font-size:15px; white-space:nowrap;}

  .stage{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:18px; padding:18px 0 6px; min-height:140px;
  }
  .word{
    display:flex; flex-wrap:wrap; justify-content:center; gap:6px;
    font-family:'Fredoka',sans-serif; font-weight:500;
  }
  .ch{
    font-size:clamp(34px,7vw,62px); line-height:1;
    color:var(--ink-soft);
    padding:6px 2px; min-width:18px; text-align:center;
    transition:color .12s ease, transform .12s ease;
  }
  .ch.done{color:var(--ok);}
  .ch.current{
    color:var(--ink);
    border-bottom:5px solid var(--cur,#ccc);
  }
  .ch.space{min-width:34px; position:relative;}
  .ch.space::after{content:""; }
  .ch.space.current::before{
    content:"space"; font-size:15px; font-family:'Nunito'; font-weight:800;
    color:#fff; background:var(--cur,#999); padding:5px 12px; border-radius:999px;
    position:relative; top:-8px;
  }
  .ch.space.done::before{
    content:"·"; color:var(--ok); font-size:40px;
  }
  .ch.space:not(.current):not(.done)::before{content:"·"; color:var(--line); font-size:40px;}

  .finger-hint{
    display:flex; align-items:center; gap:9px; min-height:26px;
    font-family:'Fredoka',sans-serif; font-weight:500; font-size:16px; color:var(--ink-soft);
  }
  .finger-hint .swatch{width:16px;height:16px;border-radius:50%;background:var(--cur,#ccc);}

  /* ---------- keyboard ---------- */
  .keyboard{
    width:100%; max-width:720px; margin:0 auto;
    display:flex; flex-direction:column; gap:8px;
    padding-bottom:8px;
  }
  .krow{display:flex; justify-content:center; gap:8px;}
  .krow.r2{padding:0 18px;}
  .krow.r3{padding:0 36px;}
  .key{
    flex:1 1 0; min-width:0;
    aspect-ratio:1/1.08;
    max-width:60px;
    background:var(--panel);
    border:1.5px solid var(--line);
    border-bottom:4px solid var(--fc,#dde6ef);
    border-radius:12px;
    display:grid; place-items:center;
    font-family:'Fredoka',sans-serif; font-weight:500;
    font-size:clamp(15px,2.4vw,21px);
    color:var(--ink);
    cursor:pointer;
    transition:transform .08s ease, box-shadow .12s ease, background .12s ease, color .12s ease;
  }
  .key.space{flex:0 0 46%; aspect-ratio:auto; height:46px; max-width:340px; font-size:15px; color:var(--ink-soft);}
  .key.next{
    background:var(--fc); color:#fff;
    border-color:var(--fc);
    transform:translateY(-4px);
    box-shadow:0 8px 18px color-mix(in srgb, var(--fc) 45%, transparent);
    animation:pulse 1.1s ease-in-out infinite;
  }
  .key.hit{background:var(--ok)!important; color:#fff!important; border-color:var(--ok)!important; transform:translateY(2px); animation:none;}
  .key.miss{animation:shake .32s; background:var(--bad); color:#fff; border-color:var(--bad);}
  @keyframes pulse{0%,100%{box-shadow:0 8px 18px color-mix(in srgb, var(--fc) 45%, transparent);} 50%{box-shadow:0 8px 26px color-mix(in srgb, var(--fc) 70%, transparent);}}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}

  /* ---------- overlay ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(35,48,62,.55);
    display:none; align-items:center; justify-content:center; padding:20px; z-index:20;
  }
  .overlay.on{display:flex;}
  .card{
    background:var(--panel); border-radius:26px; padding:34px 30px;
    text-align:center; max-width:380px; width:100%;
    box-shadow:0 24px 60px rgba(20,30,40,.3);
  }
  .card .big{font-size:54px; line-height:1; margin-bottom:8px;}
  .card h2{font-family:'Fredoka',sans-serif; font-weight:600; font-size:28px; margin:0 0 6px;}
  .card p{margin:0 0 22px; color:var(--ink-soft); font-weight:600; font-size:16px;}
  .btn{
    font-family:'Fredoka',sans-serif; font-weight:600; font-size:18px;
    color:#fff; background:var(--ok); border:none; border-radius:14px;
    padding:13px 26px; cursor:pointer; width:100%;
    box-shadow:0 6px 0 #2f8a54;
  }
  .btn:active{transform:translateY(3px); box-shadow:0 3px 0 #2f8a54;}
  .btn.alt{background:#fff; color:var(--ink-soft); border:1.5px solid var(--line); box-shadow:none; margin-top:10px;}

  @media (max-width:560px){
    .levels{grid-template-columns:1fr;}
    .krow.r2{padding:0 10px;} .krow.r3{padding:0 20px;}
    .key{border-radius:10px;}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important; transition:none!important;}
  }
  :focus-visible{outline:3px solid #4d9de0; outline-offset:2px;}
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="dots"><i></i><i></i><i></i><i></i></span>
    <h1>Type Quest</h1>
  </div>
  <div id="headerRight">
    <span class="level-tag" id="levelTag" style="display:none;">Home Row</span>
  </div>
</header>

<main>
  <!-- LEVEL SELECT -->
  <section id="selectScreen">
    <div class="lead">
      <h2>Pick a level</h2>
      <p>Watch for the glowing key, then tap it or press it.</p>
    </div>
    <div class="levels" id="levelGrid"></div>
  </section>

  <!-- PLAY -->
  <section class="play" id="playScreen">
    <div class="progress-wrap">
      <div class="bar"><i id="barFill"></i></div>
      <span class="count" id="count">1 / 1</span>
    </div>

    <div class="stage">
      <div class="word" id="word"></div>
      <div class="finger-hint" id="hint"><span class="swatch"></span><span id="hintText">Get ready…</span></div>
    </div>

    <div class="keyboard" id="keyboard"></div>
  </section>
</main>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
  <div class="card">
    <div class="big" id="ovEmoji">🎉</div>
    <h2 id="ovTitle">Level complete!</h2>
    <p id="ovText">You typed every word.</p>
    <button class="btn" id="ovNext">Next level</button>
    <button class="btn alt" id="ovHome">Back to levels</button>
  </div>
</div>

<script>
/* ---------------- finger map ---------------- */
const FINGERS = {
  LP:{v:'--LP',name:'left little finger'},
  LR:{v:'--LR',name:'left ring finger'},
  LM:{v:'--LM',name:'left middle finger'},
  LI:{v:'--LI',name:'left index finger'},
  RI:{v:'--RI',name:'right index finger'},
  RM:{v:'--RM',name:'right middle finger'},
  RR:{v:'--RR',name:'right ring finger'},
  RP:{v:'--RP',name:'right little finger'},
  TH:{v:'--TH',name:'thumb'}
};
const KEYFINGER = {
  q:'LP',w:'LR',e:'LM',r:'LI',t:'LI',y:'RI',u:'RI',i:'RM',o:'RR',p:'RP',
  a:'LP',s:'LR',d:'LM',f:'LI',g:'LI',h:'RI',j:'RI',k:'RM',l:'RR',
  z:'LP',x:'LR',c:'LM',v:'LI',b:'LI',n:'RI',m:'RI',',':'RM','.':'RR','/':'RP',
  ' ':'TH'
};
const cssColor = code => getComputedStyle(document.documentElement).getPropertyValue(FINGERS[code].v).trim();

/* ---------------- levels ---------------- */
const LEVELS = [
  { name:'Home Row', emoji:'🏠', sub:'Find the keys under your fingers',
    items:['f','j','d','k','a','s','l','g','h','as','add','dad','sad','ask','all','lad','fall','glass','flask','salad','flash'] },
  { name:'Word Builder', emoji:'🧩', sub:'Type whole words',
    items:['cat','dog','sun','run','big','red','fun','jump','play','fish','tree','book','milk','frog','green','happy','water','school','friend','because'] },
  { name:'Sentences', emoji:'✏️', sub:'Words and spaces together',
    items:['the cat is red','i can run fast','we like to play','my dog is big','the sun is hot','she has a book','look at the frog','we play in the park','i can jump up high','my friend is funny'] }
];

/* ---------------- state ---------------- */
let unlocked = 0;          // highest level index unlocked
let lvl = 0, item = 0, pos = 0;
let busy = false;

/* ---------------- build keyboard ---------------- */
const ROWS = [
  ['q','w','e','r','t','y','u','i','o','p'],
  ['a','s','d','f','g','h','j','k','l'],
  ['z','x','c','v','b','n','m',',','.','/']
];
const kb = document.getElementById('keyboard');
const keyEls = {};
ROWS.forEach((row,ri)=>{
  const div=document.createElement('div');
  div.className='krow r'+(ri+1);
  row.forEach(k=>{
    const el=document.createElement('button');
    el.className='key'; el.textContent = k;
    el.style.setProperty('--fc', cssColor(KEYFINGER[k]));
    el.dataset.key=k;
    div.appendChild(el); keyEls[k]=el;
  });
  kb.appendChild(div);
});
// space row
const sr=document.createElement('div'); sr.className='krow';
const sp=document.createElement('button'); sp.className='key space'; sp.textContent='space';
sp.style.setProperty('--fc', cssColor('TH')); sp.dataset.key=' ';
sr.appendChild(sp); keyEls[' ']=sp; kb.appendChild(sr);

/* tap input — no text field, so the iPad keyboard never pops up */
kb.addEventListener('pointerdown', e=>{
  const el=e.target.closest('.key'); if(!el) return;
  e.preventDefault();
  handle(el.dataset.key);
});

/* physical keyboard, for iPads with a case */
window.addEventListener('keydown', e=>{
  if(e.metaKey||e.ctrlKey||e.altKey) return;
  let k=e.key;
  if(k===' ') e.preventDefault();
  if(k.length===1){ handle(k.toLowerCase()); }
});

/* ---------------- build level cards ---------------- */
const grid=document.getElementById('levelGrid');
function renderLevels(){
  grid.innerHTML='';
  LEVELS.forEach((L,i)=>{
    const card=document.createElement('div');
    const locked = i>unlocked;
    card.className='lvl-card'+(locked?' locked':'');
    card.innerHTML = `
      <div class="num">${i+1}</div>
      <h3>${L.name}</h3>
      <p>${L.sub}</p>
      ${locked?'<span class="lock">🔒</span>':''}`;
    if(!locked) card.addEventListener('click',()=>startLevel(i));
    grid.appendChild(card);
  });
}

/* ---------------- play ---------------- */
const selectScreen=document.getElementById('selectScreen');
const playScreen=document.getElementById('playScreen');
const wordEl=document.getElementById('word');
const hintEl=document.getElementById('hint');
const hintText=document.getElementById('hintText');
const swatch=document.querySelector('#hint .swatch');
const barFill=document.getElementById('barFill');
const countEl=document.getElementById('count');
const levelTag=document.getElementById('levelTag');

function startLevel(i){
  lvl=i; item=0; pos=0;
  selectScreen.style.display='none';
  playScreen.classList.add('on');
  levelTag.style.display='inline-block';
  levelTag.textContent=LEVELS[i].name;
  loadItem();
}

function loadItem(){
  pos=0;
  const text=LEVELS[lvl].items[item];
  wordEl.innerHTML='';
  [...text].forEach(c=>{
    const s=document.createElement('span');
    s.className='ch'+(c===' '?' space':'');
    s.textContent = c===' ' ? '' : c;
    wordEl.appendChild(s);
  });
  countEl.textContent=`${item+1} / ${LEVELS[lvl].items.length}`;
  barFill.style.width = (item/LEVELS[lvl].items.length*100)+'%';
  refresh();
}

function refresh(){
  const text=LEVELS[lvl].items[item];
  const chars=wordEl.children;
  [...chars].forEach((s,idx)=>{
    s.classList.toggle('done', idx<pos);
    s.classList.toggle('current', idx===pos);
  });
  // clear keyboard highlight
  Object.values(keyEls).forEach(k=>k.classList.remove('next'));
  const target=text[pos];
  if(target!==undefined){
    const fc=cssColor(KEYFINGER[target]||'TH');
    const cur=target===' '?keyEls[' ']:keyEls[target];
    if(cur){ cur.classList.add('next'); }
    // set current colour on highlighted char + hint
    const curChar=chars[pos];
    if(curChar) curChar.style.setProperty('--cur',fc);
    document.documentElement.style.setProperty('--cur',fc); // used by space pill
    curChar && curChar.style.setProperty('--cur',fc);
    swatch.style.background=fc;
    hintText.textContent = FINGERS[KEYFINGER[target]||'TH'].name;
    hintEl.style.setProperty('--cur',fc);
    // also set --cur on the space char element for its pill
    if(target===' ' && curChar) curChar.style.setProperty('--cur',fc);
  }
}

function handle(k){
  if(busy || !playScreen.classList.contains('on')) return;
  const text=LEVELS[lvl].items[item];
  const target=text[pos];
  if(target===undefined) return;

  if(k===target){
    const el=keyEls[k];
    if(el){ el.classList.add('hit'); setTimeout(()=>el.classList.remove('hit'),160); }
    pos++;
    if(pos>=text.length){
      // item complete
      busy=true;
      [...wordEl.children].forEach(s=>s.classList.add('done'));
      setTimeout(()=>{
        busy=false;
        item++;
        if(item>=LEVELS[lvl].items.length){ finishLevel(); }
        else { loadItem(); }
      },360);
    } else {
      refresh();
    }
  } else {
    const el=keyEls[k];
    if(el){ el.classList.add('miss'); setTimeout(()=>el.classList.remove('miss'),320); }
  }
}

/* ---------------- level complete ---------------- */
const overlay=document.getElementById('overlay');
const ovEmoji=document.getElementById('ovEmoji');
const ovTitle=document.getElementById('ovTitle');
const ovText=document.getElementById('ovText');
const ovNext=document.getElementById('ovNext');
const ovHome=document.getElementById('ovHome');

function finishLevel(){
  barFill.style.width='100%';
  if(lvl+1>unlocked && lvl+1<LEVELS.length) unlocked=lvl+1;
  ovEmoji.textContent=LEVELS[lvl].emoji;
  const last = lvl>=LEVELS.length-1;
  ovTitle.textContent = `${LEVELS[lvl].name} done!`;
  if(last){
    ovText.textContent='You finished every level. Brilliant typing.';
    ovNext.textContent='Play again';
    ovNext.onclick=()=>{ overlay.classList.remove('on'); startLevel(0); };
  } else {
    ovText.textContent=`Next up: ${LEVELS[lvl+1].name}.`;
    ovNext.textContent=`Start ${LEVELS[lvl+1].name}`;
    ovNext.onclick=()=>{ overlay.classList.remove('on'); startLevel(lvl+1); };
  }
  setTimeout(()=>overlay.classList.add('on'),400);
}
ovHome.onclick=()=>{ overlay.classList.remove('on'); backToLevels(); };

/* ---------------- nav ---------------- */
function backToLevels(){
  playScreen.classList.remove('on');
  selectScreen.style.display='block';
  levelTag.style.display='none';
  renderLevels();
}
// header "levels" button appears during play
const headerRight=document.getElementById('headerRight');
const backBtn=document.createElement('button');
backBtn.className='btn-ghost'; backBtn.textContent='Levels'; backBtn.style.display='none';
backBtn.onclick=backToLevels;
headerRight.appendChild(backBtn);
const origStart=startLevel;
startLevel=function(i){ origStart(i); backBtn.style.display='inline-block'; levelTag.style.display='none'; };
function backToLevels2(){}

renderLevels();
</script>
</body>
</html>
